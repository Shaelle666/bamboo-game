<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>十年孤竹 - 猎杀时刻（Web）</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* 防止手机滑动页面影响操作 */
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap {
      height: 100%;
      display: grid;
      place-items: center;
    }
    canvas {
      background: #000;
      display: block;
      max-width: 100vw;
      max-height: 100vh;
    }
    .hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: rgba(255,255,255,.75);
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.15);
      padding: 8px 10px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="800" height="600"></canvas>
  </div>
  <div class="hint">第一次：点竹子挥刀｜第二次：点任意处吸收｜鼠标/手指跟随“匕首”</div>

  <script>
    // 尺寸
    const W = 800, H = 600;

    // 颜色（对应 Tkinter 版）
    const WHITE  = "#FFFFFF";
    const GREEN  = "#228B22";
    const BROWN  = "#8B4513";
    const BLACK  = "#000000";
    const YELLOW = "#FFFF00";

    // 状态：0=竹子活着；1=魂环出现；2=已吸收
    let state = 0;

    // 竹子区域
    const bamboo = { x: 380, y: 200, w: 40, h: 300 };

    // 指针（匕首跟随）
    let px = W / 2, py = H / 2;

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    // 坐标映射（canvas 可能被缩放）
    function toCanvasXY(clientX, clientY) {
      const r = canvas.getBoundingClientRect();
      const x = (clientX - r.left) * (canvas.width / r.width);
      const y = (clientY - r.top)  * (canvas.height / r.height);
      return { x, y };
    }

    function inBamboo(x, y) {
      return x >= bamboo.x && x <= bamboo.x + bamboo.w &&
             y >= bamboo.y && y <= bamboo.y + bamboo.h;
    }

    // 鼠标
    canvas.addEventListener("mousemove", (e) => {
      const p = toCanvasXY(e.clientX, e.clientY);
      px = p.x; py = p.y;
    });

    canvas.addEventListener("mousedown", (e) => {
      const p = toCanvasXY(e.clientX, e.clientY);
      px = p.x; py = p.y;

      if (state === 0 && inBamboo(p.x, p.y)) {
        state = 1; // 砍断 + 出魂环
      } else if (state === 1) {
        state = 2; // 吸收（点任意位置）
      }
    });

    // 触摸（手机）
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      const p = toCanvasXY(t.clientX, t.clientY);
      px = p.x; py = p.y;

      if (state === 0 && inBamboo(p.x, p.y)) {
        state = 1;
      } else if (state === 1) {
        state = 2;
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      const p = toCanvasXY(t.clientX, t.clientY);
      px = p.x; py = p.y;
    }, { passive: false });

    // 匕首（三角形）
    function drawDagger(x, y) {
      ctx.fillStyle = WHITE;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + 10, y + 30);
      ctx.lineTo(x - 10, y + 30);
      ctx.closePath();
      ctx.fill();
    }

    // 文字
    function drawCenterText(text) {
      ctx.fillStyle = YELLOW;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = '28px system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.fillText(text, 400, 300);
    }

    const start = performance.now();

    function frame(now) {
      const t = (now - start) / 1000;

      // 背景
      ctx.fillStyle = BLACK;
      ctx.fillRect(0, 0, W, H);

      // 竹子 / 残骸
      if (state === 0) {
        // 竹子主体
        ctx.fillStyle = GREEN;
        ctx.fillRect(bamboo.x, bamboo.y, bamboo.w, bamboo.h);

        // 竹节（黑线）
        ctx.strokeStyle = BLACK;
        ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
          const y = 250 + i * 50;
          ctx.beginPath();
          ctx.moveTo(bamboo.x, y);
          ctx.lineTo(bamboo.x + bamboo.w, y);
          ctx.stroke();
        }
      } else {
        // 残骸底座
        ctx.fillStyle = BROWN;
        ctx.fillRect(380, 450, 40, 50);
      }

      // 魂环（仅 state==1）
      if (state === 1) {
        const offset = Math.sin(t * 3.0) * 10;
        const cx = 400, cy = 350 + offset;

        // 外圈
        ctx.strokeStyle = WHITE;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 50, 20, 0, 0, Math.PI * 2);
        ctx.stroke();

        // 内圈（微粒感）
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 45, 15, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // 吸收成功文字（state==2），并且魂环/匕首都消失
      if (state === 2) {
        drawCenterText("你已吸收魂环，魂技：撑杆跳");
      }

      // 匕首（仅 state 0 或 1）
      if (state === 0 || state === 1) {
        drawDagger(px, py);
      }

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
