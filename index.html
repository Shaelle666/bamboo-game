<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>十年孤竹 - 猎杀时刻（Web）</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
      touch-action: none; /* 关键：防止手机滑动页面影响操作 */
      -webkit-user-select: none;
      user-select: none;
    }
    .wrap {
      height: 100%;
      display: grid;
      place-items: center;
    }
    canvas {
      background: #000;
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      image-rendering: pixelated;
    }
    .hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: rgba(255,255,255,.7);
      font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.15);
      padding: 8px 10px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="c" width="800" height="600"></canvas>
  </div>
  <div class="hint">点击/触摸竹子挥刀｜鼠标/手指跟随“匕首”</div>

  <script>
    // 画布尺寸（与原版一致）
    const W = 800, H = 600;

    // 颜色
    const WHITE = "#ffffff";
    const GREEN = "#228B22";
    const BROWN = "#8B4513";
    const BLACK = "#000000";

    // 游戏状态
    let bambooAlive = true;
    let showSoulRing = false;

    // 竹子区域
    const bamboo = { x: 380, y: 200, w: 40, h: 300 };

    // 输入（鼠标/手指）
    let px = W / 2, py = H / 2;

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    // 让页面标题一致
    document.title = "十年孤竹 - 猎杀时刻（Web）";

    // 辅助：将浏览器坐标映射到画布坐标（因为 canvas 可能被缩放）
    function toCanvasXY(clientX, clientY) {
      const r = canvas.getBoundingClientRect();
      const x = (clientX - r.left) * (canvas.width / r.width);
      const y = (clientY - r.top) * (canvas.height / r.height);
      return { x, y };
    }

    function inBamboo(x, y) {
      return x >= bamboo.x && x <= bamboo.x + bamboo.w && y >= bamboo.y && y <= bamboo.y + bamboo.h;
    }

    // 鼠标
    canvas.addEventListener("mousemove", (e) => {
      const p = toCanvasXY(e.clientX, e.clientY);
      px = p.x; py = p.y;
    });

    canvas.addEventListener("mousedown", (e) => {
      const p = toCanvasXY(e.clientX, e.clientY);
      px = p.x; py = p.y;
      if (bambooAlive && inBamboo(p.x, p.y)) {
        bambooAlive = false;
        showSoulRing = true;
      }
    });

    // 触摸（手机）
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      const p = toCanvasXY(t.clientX, t.clientY);
      px = p.x; py = p.y;
      if (bambooAlive && inBamboo(p.x, p.y)) {
        bambooAlive = false;
        showSoulRing = true;
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      const p = toCanvasXY(t.clientX, t.clientY);
      px = p.x; py = p.y;
    }, { passive: false });

    // 动画时间
    const start = performance.now();

    function drawFrame(now) {
      const t = (now - start) / 1000; // 秒

      // 背景
      ctx.fillStyle = BLACK;
      ctx.fillRect(0, 0, W, H);

      // 竹子/残骸
      if (bambooAlive) {
        // 竹子主体
        ctx.fillStyle = GREEN;
        ctx.fillRect(bamboo.x, bamboo.y, bamboo.w, bamboo.h);

        // 竹节（黑线）
        ctx.strokeStyle = BLACK;
        ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
          const y = 250 + i * 50;
          ctx.beginPath();
          ctx.moveTo(bamboo.x, y);
          ctx.lineTo(bamboo.x + bamboo.w, y);
          ctx.stroke();
        }
      } else {
        // 残骸底座
        ctx.fillStyle = BROWN;
        ctx.fillRect(380, 450, 40, 50);
      }

      // 魂环（上下漂浮）
      if (showSoulRing) {
        const offset = Math.sin(t * 3.0) * 10;
        const cx = 400, cy = 350 + offset;

        // 外圈
        ctx.strokeStyle = WHITE;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 50, 20, 0, 0, Math.PI * 2);
        ctx.stroke();

        // 内圈（微粒感）
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 45, 15, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // “匕首”（跟随指针）
      ctx.strokeStyle = WHITE;
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + 20, py + 20);
      ctx.stroke();

      requestAnimationFrame(drawFrame);
    }

    requestAnimationFrame(drawFrame);
  </script>
</body>
</html>
